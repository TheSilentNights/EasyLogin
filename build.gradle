plugins {
    id "java"
    id 'dev.architectury.loom' version '1.11-SNAPSHOT' apply(false)
    id 'architectury-plugin' version '3.4-SNAPSHOT'
    id 'com.gradleup.shadow' version '8.3.6' apply false
}

architectury {
    minecraft = minecraft_version
}

allprojects {
    group = maven_group
    version = mod_version
}

subprojects {
    apply plugin: 'dev.architectury.loom'
    apply plugin: 'architectury-plugin'
    apply plugin: 'maven-publish'
    apply plugin: 'com.gradleup.shadow'

    base {
        // Set up a suffixed format for the mod jar names, e.g. `example-fabric`.
        archivesName = "$archives_name-$project.name"
    }

    repositories {
        // Add repositories to retrieve artifacts from in here.
        // You should only use this when depending on other mods because
        // Loom adds the essential maven repositories to download Minecraft and libraries from automatically.
        // See https://docs.gradle.org/current/userguide/declaring_repositories.html
        // for more information about repositories.
        maven {
            name = 'ParchmentMC'
            url = 'https://maven.parchmentmc.org'
        }
    }

    dependencies {
        minecraft "net.minecraft:minecraft:$minecraft_version"
//        mappings "net.fabricmc:yarn:$yarn_mappings:v2"

        mappings loom.layered() {
            officialMojangMappings()
            parchment("org.parchmentmc.data:parchment-${minecraft_version}:2021.12.12@zip")
        }

        implementation("cn.hutool:hutool-all:${hutool_version}")
        implementation("org.mybatis:mybatis:${mybatis_version}")
        implementation("com.zaxxer:HikariCP:${hikaricp_version}")
        implementation("org.xerial:sqlite-jdbc:${sqlite_version}")



        // https://mvnrepository.com/artifact/org.springframework/spring-context
        implementation("org.springframework:spring-context:6.2.13")

        //lombok
        compileOnly("org.projectlombok:lombok:1.18.42")
        annotationProcessor("org.projectlombok:lombok:1.18.42")

        // https://mvnrepository.com/artifact/tools.jackson.core/jackson-core
        implementation("tools.jackson.core:jackson-core:3.0.2")
        // https://mvnrepository.com/artifact/tools.jackson.core/jackson-databind
        implementation("tools.jackson.core:jackson-databind:3.0.2")
        // https://mvnrepository.com/artifact/com.fasterxml.jackson.core/jackson-annotations
        implementation("com.fasterxml.jackson.core:jackson-annotations:3.0-rc5")


        // https://mvnrepository.com/artifact/junit/junit
        testImplementation("junit:junit:4.13.2")


    }

    java {
        // Loom will automatically attach sourcesJar to a RemapSourcesJar task and to the "build" task
        // if it is present.
        // If you remove this line, sources will not be generated.
        withSourcesJar()

        sourceCompatibility = JavaVersion.VERSION_21
        targetCompatibility = JavaVersion.VERSION_21
    }

    tasks.withType(JavaCompile).configureEach {
        it.options.release = 21
    }

    // Configure Maven publishing.
    publishing {
        publications {
            mavenJava(MavenPublication) {
                artifactId = base.archivesName.get()
                from components.java
            }
        }

        // See https://docs.gradle.org/current/userguide/publishing_maven.html for information on how to set up publishing.
        repositories {
            // Add repositories to publish to here.
            // Notice: This block does NOT have the same function as the block in the top level.
            // The repositories here will be used for publishing your artifact, not for
            // retrieving dependencies.
        }
    }
}
